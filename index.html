<head>

    <title>Mel's Study Planner</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        /* Add all your inline styles here */
        body {
            font-family: Arial, sans-serif;

            padding: 10px;
            cursor: pointer;

            border-radius: 5px;
        }

    <main>
